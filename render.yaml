services:
  - type: web
    name: sentimentscribe-api
    runtime: python
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_TYPE
        value: sklearn
      - key: ARTIFACTS_DIR
        value: experiments/artifacts
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
    healthCheckPath: /health
